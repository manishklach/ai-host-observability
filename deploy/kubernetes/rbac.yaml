apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-host-observability
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-host-observability
rules:
  - apiGroups: [""]
    resources:
      - nodes
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-host-observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-host-observability
subjects:
  - kind: ServiceAccount
    name: ai-host-observability
    namespace: monitoring
