apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ai-host-observability
  namespace: monitoring
  labels:
    app.kubernetes.io/name: ai-host-observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-host-observability
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-host-observability
    spec:
      serviceAccountName: ai-host-observability
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      hostPID: true
      hostNetwork: false
      securityContext:
        runAsNonRoot: false
      containers:
        - name: collector
          image: ghcr.io/manishklach/ai-host-observability:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              touch /tmp/liveness_stamp
              while true; do
                touch /tmp/liveness_stamp
                OUT_DIR="${OUT_DIR}" bash /opt/ai-host-observability/scripts/collect-all.sh
                sleep 60
              done
          env:
            - name: OUT_DIR
              value: /var/lib/node_exporter/textfile_collector
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - SYS_PTRACE
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -lc
                - |
                  set -euo pipefail
                  find /var/lib/node_exporter/textfile_collector -name "*.prom" -newer /tmp/liveness_stamp | grep -q .
                  find /var/lib/node_exporter/textfile_collector -name "*.prom" -mmin -2 | grep -q .
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: proc
              mountPath: /proc
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: textfile-collector
              mountPath: /var/lib/node_exporter/textfile_collector
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: proc
          hostPath:
            path: /proc
            type: Directory
        - name: sys
          hostPath:
            path: /sys
            type: Directory
        - name: textfile-collector
          hostPath:
            path: /var/lib/node_exporter/textfile_collector
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
