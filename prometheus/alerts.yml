groups:
  - name: ai-host-observability
    rules:
      - alert: HostMemoryPSIHigh
        expr: nixl_host_memory_psi_avg{scope="full",window="60s"} > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host memory PSI has stayed elevated.
          description: Full memory PSI over the 60 second window has remained above 0.1 for five minutes, which usually means the host is stalling on memory reclaim or direct allocation pressure. Check MemAvailable, reclaim counters, cgroup growth, and whether RDMA registration or pinned memory is expanding.
          runbook_url: docs/runbooks/HostMemoryPSIHigh.md

      - alert: HostMemoryPSICritical
        expr: nixl_host_memory_psi_avg{scope="full",window="60s"} > 0.3
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Host memory PSI is at a critical level.
          description: Full memory PSI over the 60 second window has exceeded 0.3 for two minutes, which usually means the host is spending a large fraction of wall time stalled on memory pressure. Check cgroup OOM activity, MemAvailable collapse, reclaim spikes, and whether the node is heading toward a host OOM or severe tail latency.
          runbook_url: docs/runbooks/HostMemoryPSICritical.md

      - alert: RDMAFwPagesGrowing
        expr: increase(nixl_host_fw_pages_sum[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: RDMA firmware page usage is growing.
          description: The summed mlx5 firmware page footprint has increased over the last fifteen minutes, which can indicate rising host-side registration pressure even when GPU dashboards still look healthy. Check multi-HCA fan-out, buffer registration behavior, and whether host memory pressure is growing in parallel.
          runbook_url: docs/runbooks/RDMAFwPagesGrowing.md

      - alert: GPUBar1NearFull
        expr: nixl_gpu_bar1_used_bytes / nixl_gpu_bar1_total_bytes > 0.9
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: GPU BAR1 usage is near full.
          description: BAR1 utilization has stayed above 90 percent for three minutes, which can signal host-GPU mapping pressure and transport-side strain around large working sets. Check BAR1 alongside pinned memory, GPU transfer paths, and whether the host is also showing reclaim or PCIe-side distress.
          runbook_url: docs/runbooks/GPUBar1NearFull.md

      - alert: KernelOOMOccurred
        expr: rate(nixl_kernel_log_pattern_total{pattern="oom"}[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Kernel OOM activity has been detected.
          description: Kernel log OOM pattern counters are increasing over the last five minutes, which means the node is already recording OOM behavior rather than only trending toward it. Check killed processes, cgroup memory events, reclaim counters, and whether RDMA registration, pinned memory, or runaway processes are consuming host RAM.
          runbook_url: docs/runbooks/KernelOOMOccurred.md

      - alert: NICRxDropsIncreasing
        expr: rate(nixl_softnet_stat_total{field="dropped"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host receive drops are increasing.
          description: Softnet dropped counters are rising faster than ten events per second over five minutes, which usually means the host networking path is falling behind. Check CPU softirq load, IRQ affinity, ethtool drop counters, queue pressure, and whether RDMA or bulk ingress traffic is saturating the node.
          runbook_url: docs/runbooks/NICRxDropsIncreasing.md

      - alert: GPUECCErrorsDetected
        expr: increase(nixl_gpu_ecc_volatile_total[10m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: GPU ECC errors were detected.
          description: Volatile GPU ECC error counters increased during the last ten minutes, which may indicate a memory integrity issue on one or more GPUs. Check the affected GPU index, recent workloads, thermal conditions, and whether driver or hardware logs show correlated faults.
          runbook_url: docs/runbooks/GPUECCErrorsDetected.md

      - alert: ExporterNotRunning
        expr: ai_host_exporter_last_run_success == 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: An ai-host-observability exporter is not completing successfully.
          description: The wrapper has reported one or more exporters in a failed state for at least three minutes. Check the exporter name, recent deployment or permission changes, missing host paths or vendor tools, and whether the textfile collector directory is writable.
          runbook_url: docs/runbooks/ExporterNotRunning.md

      - alert: EDACCorrectableErrors
        expr: increase(nixl_edac_correctable_errors_total[1h]) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Correctable EDAC memory errors are accumulating.
          description: More than ten correctable EDAC errors were recorded during the last hour for at least one memory controller channel. This usually means DIMM degradation is in progress and should be treated as an early hardware warning before it turns into an uncorrectable error or a host crash.
          runbook_url: docs/runbooks/EDACCorrectableErrors.md

      - alert: EDACUncorrectableErrors
        expr: increase(nixl_edac_uncorrectable_errors_total[10m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: Uncorrectable EDAC memory errors were detected.
          description: An uncorrectable EDAC memory error has occurred within the last ten minutes. This is a data-integrity event, not just a pressure signal, and should be handled as potential corruption risk for running training or inference workloads.
          runbook_url: docs/runbooks/EDACUncorrectableErrors.md

      - alert: CPUThermalThrottling
        expr: rate(nixl_cpu_thermal_throttle_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: CPU thermal throttling is occurring.
          description: CPU core or package throttle counters are increasing, which means the host is thermal-throttling under load. Training jobs can show non-deterministic throughput cliffs or tail latency when the package repeatedly hits thermal limits.
          runbook_url: docs/runbooks/CPUThermalThrottling.md

      - alert: CPUFreqBelowMax
        expr: nixl_cpu_freq_current_khz{stat="mean"} / nixl_cpu_freq_max_khz < 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: CPU packages are sustaining frequencies below rated maximum.
          description: The mean package frequency has remained below 85 percent of the rated maximum for five minutes. Check cooling, BIOS power limits, cgroup CPU limits, and whether thermal throttling or package power caps are suppressing performance.
          runbook_url: docs/runbooks/CPUFreqBelowMax.md

      - alert: NVLinkDown
        expr: nixl_nvlink_state == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: An NVLink is down.
          description: One or more NVLink links are not active. Multi-GPU collectives can hang or lose throughput sharply when a link is unavailable, especially on topologies that expect a full fabric.
          runbook_url: docs/runbooks/NVLinkDown.md

      - alert: NVLinkErrorsIncreasing
        expr: rate(nixl_nvlink_error_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: NVLink errors are increasing.
          description: NVLink replay, recovery, or CRC errors are accumulating over time, which is often a pre-failure fabric signal even if GPU memory and utilization still look normal. Check XID events, thermals, seating, and recent topology changes.
          runbook_url: docs/runbooks/NVLinkErrorsIncreasing.md

      - alert: HugepagesExhausted
        expr: nixl_hugepages_free{size="2048kB"} == 0 and nixl_hugepages_total{size="2048kB"} > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 2MB hugepage pool is exhausted.
          description: The 2MB hugepage pool is fully allocated while the host still expects that page size to be available. New RDMA registrations, pinned buffers, or GPU BAR mappings may fall back to small pages and show unstable performance.
          runbook_url: docs/runbooks/HugepagesExhausted.md

      - alert: THPFallbackRateHigh
        expr: rate(nixl_thp_fault_fallback_total[5m]) / (rate(nixl_thp_fault_alloc_total[5m]) + rate(nixl_thp_fault_fallback_total[5m]) + 1) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Transparent hugepage fallback rate is high.
          description: More than twenty percent of transparent hugepage allocation attempts are falling back to small pages. This can create unstable memory performance and higher CPU overhead for registration-heavy GPU and RDMA workloads.
          runbook_url: docs/runbooks/THPFallbackRateHigh.md

      - alert: KernelSoftLockupDetected
        expr: rate(nixl_kernel_log_pattern_total{pattern="soft_lockup"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: Kernel soft lockup detected.
          description: The kernel log contains soft lockup events, which means one or more CPUs spent excessive time stuck without scheduling normally. The host may already be partially unresponsive or heading toward a panic path.
          runbook_url: docs/runbooks/KernelSoftLockupDetected.md

      - alert: KernelHungTaskDetected
        expr: rate(nixl_kernel_log_pattern_total{pattern="hung_task"}[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Kernel hung task detected.
          description: The kernel log is reporting blocked or hung tasks. This often precedes broader stalls in storage, filesystems, or driver paths and should be investigated before the host becomes unusable.
          runbook_url: docs/runbooks/KernelHungTaskDetected.md

      - alert: RCUStallDetected
        expr: rate(nixl_kernel_log_pattern_total{pattern="rcu_stall"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: RCU stall detected.
          description: The kernel has logged an RCU stall, which points to severe scheduling starvation, runaway interrupt load, or a CPU that is no longer making forward progress.
          runbook_url: docs/runbooks/RCUStallDetected.md

      - alert: ClockNotSynchronised
        expr: nixl_timesync_synchronized == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: System clock is not synchronised.
          description: The host is not reporting an NTP-synchronised clock. Multi-node checkpoints, timeout correlation, and transport diagnostics may all become less trustworthy when timestamps drift.
          runbook_url: docs/runbooks/ClockNotSynchronised.md

      - alert: ClockOffsetHigh
        expr: abs(nixl_timesync_offset_seconds) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Clock offset is above 10ms.
          description: The measured clock offset has stayed above 10 milliseconds for five minutes. On distributed GPU jobs this can create misleading timeout behaviour and poor cross-node log correlation.
          runbook_url: docs/runbooks/ClockOffsetHigh.md

      - alert: ClockStratumHigh
        expr: nixl_timesync_stratum > 3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Clock stratum is higher than expected.
          description: The host is several hops away from a reliable time source. That usually indicates degraded NTP quality and increases the risk of drift over longer training jobs.
          runbook_url: docs/runbooks/ClockStratumHigh.md

      - alert: GPUHWSlowdown
        expr: nixl_gpu_throttle_reason{reason="hw_slowdown"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: GPU hardware slowdown is active.
          description: The GPU is reporting a hardware slowdown reason, which usually means a severe thermal or power-protection path is active. Performance will be materially degraded and the host should be treated as unreliable for steady training throughput.
          runbook_url: docs/runbooks/GPUHWSlowdown.md

      - alert: GPUPowerCapThrottling
        expr: nixl_gpu_throttle_reason{reason="sw_power_cap"} == 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: GPU is throttling on software power cap.
          description: The GPU is being limited by a configured software power cap. If this is unexpected, review the enforced power limit and whether the node was intentionally derated.
          runbook_url: docs/runbooks/GPUPowerCapThrottling.md

      - alert: GPUNotAtP0
        expr: nixl_gpu_pstate{pstate!="P0"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: GPU is not in maximum-performance P-state.
          description: The GPU has remained outside P0 for five minutes. During active training windows this often means the device is throttled, under-driven, or otherwise not reaching its intended performance state.
          runbook_url: docs/runbooks/GPUNotAtP0.md

      - alert: GPUClocksBelowMax
        expr: nixl_gpu_clock_sm_mhz / nixl_gpu_clock_max_sm_mhz < 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: GPU SM clocks are materially below maximum.
          description: The GPU SM clock has stayed more than ten percent below the rated maximum. Check throttle reasons, enforced power limits, thermals, and whether application clocks were intentionally constrained.
          runbook_url: docs/runbooks/GPUClocksBelowMax.md

      - alert: MetricZScoreHigh
        expr: nixl_baseline_zscore{metric_id=~"psi_mem.*|fw_pages.*|ib_rcv.*"} > 3
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: A baseline-tracked metric is far above its recent norm.
          description: >-
            The local rolling baseline exporter has flagged {{ $labels.metric_id }}
            at more than three standard deviations above its recent 24 hour baseline.
            Investigate the paired raw metric, the host activity that changed it,
            and whether this is a new steady state or a transient incident precursor.
          runbook_url: docs/runbooks/MetricZScoreHigh.md

      - alert: MetricExceedsP99
        expr: nixl_baseline_current > nixl_baseline_p99 and nixl_baseline_window_size > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: A baseline-tracked metric is above its recent p99.
          description: >-
            {{ $labels.metric_id }} is sitting above its local rolling p99 baseline
            with more than an hour of baseline history available. Treat this as an
            early warning that the node has moved out of its normal operating
            envelope even if user-visible failures have not started yet.
          runbook_url: docs/runbooks/MetricExceedsP99.md

      - alert: TrainingJobStallSuspected
        expr: nixl_job_stall_suspected == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: A training job appears stalled.
          description: >-
            The host has active training-like processes and GPU activity, but no
            checkpoint writes or log progress signals. The workload may be hung in
            communication, input, filesystem, or framework runtime code.
          runbook_url: docs/runbooks/TrainingJobStallSuspected.md

      - alert: CheckpointWritesStalled
        expr: nixl_job_checkpoint_last_write_age_seconds > 3600 and nixl_job_training_processes_total > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Training checkpoints have stopped refreshing.
          description: >-
            Training-like processes are still running, but the newest checkpoint
            beneath a watched root is older than one hour. Recovery points may be
            stale and the job may be making no useful progress.
          runbook_url: docs/runbooks/CheckpointWritesStalled.md

      - alert: TrainingProcessDied
        expr: nixl_job_training_processes_total == 0 and nixl_gpu_utilization_percent > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: GPU activity is present without a visible training process.
          description: >-
            GPU utilization is still above five percent, but no training-like
            process is visible to the heartbeat exporter. A launcher may have
            crashed, the process may be orphaned, or GPU context cleanup may be
            incomplete.
          runbook_url: docs/runbooks/TrainingProcessDied.md
