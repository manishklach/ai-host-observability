groups:
  - name: ai-host-observability
    rules:
      - alert: HostMemoryPSIHigh
        expr: nixl_host_memory_psi_avg{scope="full",window="60s"} > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host memory PSI has stayed elevated.
          description: Full memory PSI over the 60 second window has remained above 0.1 for five minutes, which usually means the host is stalling on memory reclaim or direct allocation pressure. Check MemAvailable, reclaim counters, cgroup growth, and whether RDMA registration or pinned memory is expanding.
          runbook_url: docs/runbooks/HostMemoryPSIHigh.md

      - alert: HostMemoryPSICritical
        expr: nixl_host_memory_psi_avg{scope="full",window="60s"} > 0.3
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Host memory PSI is at a critical level.
          description: Full memory PSI over the 60 second window has exceeded 0.3 for two minutes, which usually means the host is spending a large fraction of wall time stalled on memory pressure. Check cgroup OOM activity, MemAvailable collapse, reclaim spikes, and whether the node is heading toward a host OOM or severe tail latency.
          runbook_url: docs/runbooks/HostMemoryPSICritical.md

      - alert: RDMAFwPagesGrowing
        expr: increase(nixl_host_fw_pages_sum[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: RDMA firmware page usage is growing.
          description: The summed mlx5 firmware page footprint has increased over the last fifteen minutes, which can indicate rising host-side registration pressure even when GPU dashboards still look healthy. Check multi-HCA fan-out, buffer registration behavior, and whether host memory pressure is growing in parallel.
          runbook_url: docs/runbooks/RDMAFwPagesGrowing.md

      - alert: GPUBar1NearFull
        expr: nixl_gpu_bar1_used_bytes / nixl_gpu_bar1_total_bytes > 0.9
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: GPU BAR1 usage is near full.
          description: BAR1 utilization has stayed above 90 percent for three minutes, which can signal host-GPU mapping pressure and transport-side strain around large working sets. Check BAR1 alongside pinned memory, GPU transfer paths, and whether the host is also showing reclaim or PCIe-side distress.
          runbook_url: docs/runbooks/GPUBar1NearFull.md

      - alert: KernelOOMOccurred
        expr: rate(nixl_kernel_log_pattern_total{pattern="oom"}[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Kernel OOM activity has been detected.
          description: Kernel log OOM pattern counters are increasing over the last five minutes, which means the node is already recording OOM behavior rather than only trending toward it. Check killed processes, cgroup memory events, reclaim counters, and whether RDMA registration, pinned memory, or runaway processes are consuming host RAM.
          runbook_url: docs/runbooks/KernelOOMOccurred.md

      - alert: NICRxDropsIncreasing
        expr: rate(nixl_softnet_stat_total{field="dropped"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host receive drops are increasing.
          description: Softnet dropped counters are rising faster than ten events per second over five minutes, which usually means the host networking path is falling behind. Check CPU softirq load, IRQ affinity, ethtool drop counters, queue pressure, and whether RDMA or bulk ingress traffic is saturating the node.
          runbook_url: docs/runbooks/NICRxDropsIncreasing.md

      - alert: GPUECCErrorsDetected
        expr: increase(nixl_gpu_ecc_volatile_total[10m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: GPU ECC errors were detected.
          description: Volatile GPU ECC error counters increased during the last ten minutes, which may indicate a memory integrity issue on one or more GPUs. Check the affected GPU index, recent workloads, thermal conditions, and whether driver or hardware logs show correlated faults.
          runbook_url: docs/runbooks/GPUECCErrorsDetected.md

      - alert: ExporterNotRunning
        expr: ai_host_exporter_last_run_success == 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: An ai-host-observability exporter is not completing successfully.
          description: The wrapper has reported one or more exporters in a failed state for at least three minutes. Check the exporter name, recent deployment or permission changes, missing host paths or vendor tools, and whether the textfile collector directory is writable.
          runbook_url: docs/runbooks/ExporterNotRunning.md

      - alert: EDACCorrectableErrors
        expr: increase(nixl_edac_correctable_errors_total[1h]) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Correctable EDAC memory errors are accumulating.
          description: More than ten correctable EDAC errors were recorded during the last hour for at least one memory controller channel. This usually means DIMM degradation is in progress and should be treated as an early hardware warning before it turns into an uncorrectable error or a host crash.
          runbook_url: docs/runbooks/EDACCorrectableErrors.md

      - alert: EDACUncorrectableErrors
        expr: increase(nixl_edac_uncorrectable_errors_total[10m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: Uncorrectable EDAC memory errors were detected.
          description: An uncorrectable EDAC memory error has occurred within the last ten minutes. This is a data-integrity event, not just a pressure signal, and should be handled as potential corruption risk for running training or inference workloads.
          runbook_url: docs/runbooks/EDACUncorrectableErrors.md

      - alert: CPUThermalThrottling
        expr: rate(nixl_cpu_thermal_throttle_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: CPU thermal throttling is occurring.
          description: CPU core or package throttle counters are increasing, which means the host is thermal-throttling under load. Training jobs can show non-deterministic throughput cliffs or tail latency when the package repeatedly hits thermal limits.
          runbook_url: docs/runbooks/CPUThermalThrottling.md

      - alert: CPUFreqBelowMax
        expr: nixl_cpu_freq_current_khz{stat="mean"} / nixl_cpu_freq_max_khz < 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: CPU packages are sustaining frequencies below rated maximum.
          description: The mean package frequency has remained below 85 percent of the rated maximum for five minutes. Check cooling, BIOS power limits, cgroup CPU limits, and whether thermal throttling or package power caps are suppressing performance.
          runbook_url: docs/runbooks/CPUFreqBelowMax.md
