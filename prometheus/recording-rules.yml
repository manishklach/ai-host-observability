groups:
  - name: nixl_hourly
    interval: 1m
    rules:
      - record: nixl:gpu:utilization_avg_1h
        expr: avg_over_time(nixl_gpu_utilization_percent[1h])

      - record: nixl:gpu:temperature_max_1h
        expr: max_over_time(nixl_gpu_temperature_celsius[1h])

      - record: nixl:memory:psi_some_avg_1h
        expr: avg_over_time(nixl_host_memory_psi_avg{scope="some",window="60s"}[1h])

      - record: nixl:disk:io_utilization_avg_1h
        expr: avg_over_time((rate(nixl_diskstat_total{field="ms_io"}[5m]) / 10)[1h:1m])

      - record: nixl:net:rx_bytes_rate_avg_1h
        expr: avg_over_time(rate(nixl_netdev_total{field="rx_bytes"}[5m])[1h:1m])

      - record: nixl:ib:rcv_errors_rate_avg_1h
        expr: avg_over_time(rate(nixl_infiniband_counter{counter="port_rcv_errors"}[5m])[1h:1m])

  - name: nixl_daily
    interval: 5m
    rules:
      - record: nixl:gpu:utilization_avg_24h
        expr: avg_over_time(nixl:gpu:utilization_avg_1h[24h:1h])

      - record: nixl:memory:psi_p95_24h
        expr: quantile_over_time(0.95, nixl_host_memory_psi_avg{scope="some",window="60s"}[24h:1m])

      - record: nixl:filesystem:usage_percent
        expr: 100 * nixl_filesystem_bytes{field="used"} / ignoring(field) clamp_min(nixl_filesystem_bytes{field="size"}, 1)

      - record: nixl:filesystem:usage_percent_max
        expr: max by (filesystem, mount, fstype) (nixl:filesystem:usage_percent)

      - record: nixl:gpu:ecc_errors_daily
        expr: increase(nixl_gpu_ecc_volatile_total[24h])

      - record: nixl:edac:ce_errors_daily
        expr: increase(nixl_edac_correctable_errors_total[24h])

  - name: nixl_slo
    interval: 1m
    rules:
      - record: nixl:gpu:available
        expr: max by (index, uuid) ((nixl_gpu_pstate{pstate="P0"} == bool 1) * on(index, uuid) (1 - nixl_gpu_throttle_reason{reason="hw_slowdown"}))

      - record: nixl:storage:healthy
        expr: min by (filesystem, mount, fstype) ((nixl_filesystem_bytes{field="avail"} / ignoring(field) clamp_min(nixl_filesystem_bytes{field="size"}, 1)) > bool 0.10)

      - record: nixl:fabric:healthy
        expr: min by (device, port) ((nixl_infiniband_port_state == bool 4) * on(device, port) (rate(nixl_infiniband_counter{counter="port_rcv_errors"}[5m]) == bool 0))

      - record: nixl:host:health_score
        expr: (avg(nixl:gpu:available) + avg(nixl:storage:healthy) + avg(nixl:fabric:healthy)) / 3
