name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SHELLCHECK_OPTS: -x -e SC2249,SC2250,SC2310,SC2312
    steps:
      # Keep CI close to the operator install path: syntax, lint, tests, packaging surfaces.
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Install test tools
        run: |
          sudo apt-get install -y jq python3-yaml shellcheck systemd shfmt

      - name: Full test suite
        run: make test

      - name: Lint (make lint)
        run: make lint

      - name: Lint (shellcheck scripts)
        run: shellcheck ${SHELLCHECK_OPTS} scripts/*.sh

      - name: Lint (shellcheck tests)
        run: shellcheck ${SHELLCHECK_OPTS} tests/helpers.bash tests/*.bats

      - name: Validate Grafana JSON
        run: jq empty grafana/ai-host-overview.json

      - name: Validate alert rules
        run: |
          python3 - <<'PY'
          import yaml
          with open("prometheus/alerts.yml", "r", encoding="utf-8") as handle:
              yaml.safe_load(handle)
          PY

      - name: Verify systemd units
        run: |
          if command -v systemd-analyze >/dev/null 2>&1; then
            systemd-analyze verify deploy/systemd/*.service deploy/systemd/*.timer
          fi
