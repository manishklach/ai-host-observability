name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck jq python3-yaml systemd

      - name: Validate before packaging
        run: |
          make test
          make lint

      - name: Derive version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build install tree
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          make install PREFIX="dist/ai-host-observability-${VERSION}"

      - name: Archive release (tarball)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          tar -C dist -czf "ai-host-observability-${VERSION}.tar.gz" "ai-host-observability-${VERSION}"
          sha256sum "ai-host-observability-${VERSION}.tar.gz" > SHA256SUMS

      - name: Install nfpm
        run: |
          curl -sSL https://nfpm.goreleaser.com/install.sh | bash -s -- -b /usr/local/bin

      - name: Build DEB/RPM packages
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          nfpm package --config nfpm.yaml --packager deb --target "ai-host-observability-${VERSION}_amd64.deb"
          nfpm package --config nfpm.yaml --packager rpm --target "ai-host-observability-${VERSION}-1.x86_64.rpm"
          sha256sum "ai-host-observability-${VERSION}_amd64.deb" >> SHA256SUMS
          sha256sum "ai-host-observability-${VERSION}-1.x86_64.rpm" >> SHA256SUMS

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ai-host-observability-${{ steps.version.outputs.version }}.tar.gz
            ai-host-observability-${{ steps.version.outputs.version }}_amd64.deb
            ai-host-observability-${{ steps.version.outputs.version }}-1.x86_64.rpm
            SHA256SUMS

