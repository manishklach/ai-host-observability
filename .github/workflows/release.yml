name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SHELLCHECK_OPTS: -x -e SC2249,SC2250,SC2310,SC2312
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Install release tools
        run: |
          sudo apt-get install -y shfmt shellcheck

      - name: Run tests
        run: make test

      - name: Run lint
        run: make lint

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build install tree
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          make install PREFIX="dist/ai-host-observability-${VERSION}"

      - name: Create release tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          tar -czf "ai-host-observability-${VERSION}.tar.gz" -C dist .
          sha256sum "ai-host-observability-${VERSION}.tar.gz" > SHA256SUMS

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ai-host-observability-${{ steps.version.outputs.version }}.tar.gz
            SHA256SUMS
          generate_release_notes: true
