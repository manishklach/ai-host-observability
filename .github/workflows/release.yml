name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck jq python3-yaml systemd

      - name: Validate before packaging
        run: |
          make test
          make lint

      - name: Derive version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build install tree
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          make install PREFIX="dist/ai-host-observability-${VERSION}"

      - name: Archive release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          tar -C dist -czf "ai-host-observability-${VERSION}.tar.gz" "ai-host-observability-${VERSION}"
          sha256sum "ai-host-observability-${VERSION}.tar.gz" > SHA256SUMS

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ai-host-observability-${{ steps.version.outputs.version }}.tar.gz
            SHA256SUMS

